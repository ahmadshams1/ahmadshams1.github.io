<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Nisa Catering</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: Arial, sans-serif;
    }

    body {
      height: 100vh;
    }

    .hero {
      height: 100vh;
      background: url('https://images.unsplash.com/photo-1504674900247-0877df9cc836') no-repeat center/cover;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
      color: white;
      text-align: center;
    }

    .overlay {
      position: absolute;
      width: 100%;
      height: 100%;
      background: rgba(0,0,0,0.5);
      top: 0;
      left: 0;
    }

    .content {
      position: relative;
      z-index: 1;
    }

    h1 {
      font-size: 60px;
      letter-spacing: 5px;
      margin-bottom: 20px;
    }

    .btn {
      background: white;
      color: black;
      padding: 12px 30px;
      border-radius: 25px;
      text-decoration: none;
      font-weight: bold;
    }

    .btn:hover {
      background: #ddd;
    }
  </style>
</head>

<body>

  <div class="hero">
    <div class="overlay"></div>

    <div class="content">
      <h1>A TASTE OF KABUL</h1>
      <a href="#" class="btn">Order Now</a>
    </div>
  </div>

</body>
</html>
